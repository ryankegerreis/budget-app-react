# Dependabot config schema version.
version: 2

# Security-only Dependabot policy:
# - Do not open routine non-security dependency update PRs.
# - Group minor/patch security fixes to reduce PR noise.
# - Leave major security fixes ungrouped so breaking upgrades are reviewed alone.
updates:
  - package-ecosystem: "npm"
    # Scan the package.json/package-lock.json at the repository root.
    directory: "/"
    schedule:
      # Dependabot requires a schedule for this npm entry. Routine version-update
      # PRs are disabled below, and security updates remain alert-driven.
      interval: "weekly"
    # Disable routine non-security version-update PRs. This limit does not block
    # Dependabot security update PRs, which use a separate internal limit.
    open-pull-requests-limit: 0
    groups:
      # Bundle semver-minor and semver-patch security fixes together. These PRs
      # are still created in response to security alerts, not on the weekly schedule.
      security-minor-and-patch:
        applies-to: security-updates
        patterns:
          # Match every npm dependency in this ecosystem.
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Semver-major security fixes intentionally do not match this group.
      # Dependabot raises those as separate security PRs so each breaking upgrade
      # can be reviewed and tested on its own.
